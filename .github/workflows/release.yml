name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes "yt-vd $TAG_NAME" \
              --latest

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            cli_asset: yt-vd.exe
            gui_asset: yt-vd-gui.exe
          - name: linux
            os: ubuntu-latest
            cli_asset: yt-vd
            gui_asset: yt-vd-gui

    steps:
      - name: Checkout source
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "$PYTHON" --version
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install . "pyinstaller>=6.11.0"

      - name: Build executables
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "$PYTHON" -m PyInstaller yt-vd.spec --clean --noconfirm

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG_NAME" \
            "dist/${{ matrix.cli_asset }}" \
            "dist/${{ matrix.gui_asset }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
