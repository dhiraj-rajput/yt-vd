name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            cli_asset: yt-vd.exe
            gui_asset: yt-vd-gui.exe
          - name: linux
            os: ubuntu-latest
            cli_asset: yt-vd
            gui_asset: yt-vd-gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build executables
        run: uv run pyinstaller yt-vd.spec --clean --noconfirm

      - name: Prepare assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp "dist/${{ matrix.cli_asset }}" "release-assets/${{ matrix.cli_asset }}"
          cp "dist/${{ matrix.gui_asset }}" "release-assets/${{ matrix.gui_asset }}"

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "yt-vd $TAG_NAME" --latest
          gh release upload "$TAG_NAME" release-assets/release-windows/* release-assets/release-linux/* --clobber
